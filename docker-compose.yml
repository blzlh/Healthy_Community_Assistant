services:
  nginx:
    image: nginx:1.27-alpine
    container_name: hca-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro

  postgres:
    image: postgres:16-alpine
    container_name: hca-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-healthy_community}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hca-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # ==================== ELK Stack ====================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: hca-elasticsearch
    environment:
      - node.name=hca-es01
      - cluster.name=hca-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: hca-logstash
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
      - "${LOGSTASH_API_PORT:-9600}:9600"
    volumes:
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./infra/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: hca-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=hca-kibana
      - SERVER_PUBLICBASEURL=http://localhost:${KIBANA_PORT:-5601}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
