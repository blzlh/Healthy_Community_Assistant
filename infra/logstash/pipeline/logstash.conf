# Logstash Pipeline - 接收来自应用的日志并推送到 Elasticsearch

input {
  # TCP 输入 - 接收 JSON 格式的安全日志
  tcp {
    port => 5044
    codec => json_lines
    tags => ["security_log"]
  }
}

filter {
  # 解析时间戳
  date {
    match => ["createdAt", "ISO8601"]
    target => "@timestamp"
  }

  # 添加索引名称根据日志类型
  if [type] == "brute_force" {
    mutate {
      add_field => { "[@metadata][index]" => "hca-security-%{+YYYY.MM.dd}" }
    }
  } else if [type] == "api_abuse" {
    mutate {
      add_field => { "[@metadata][index]" => "hca-api-abuse-%{+YYYY.MM.dd}" }
    }
  } else if [type] == "spam" {
    mutate {
      add_field => { "[@metadata][index]" => "hca-websocket-%{+YYYY.MM.dd}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index]" => "hca-logs-%{+YYYY.MM.dd}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}"
    template_name => "hca-template"
  }

  # 调试输出（可选）
  # stdout {
  #   codec => rubydebug
  # }
}
